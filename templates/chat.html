<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <style>
        body {
            background: rgba(0, 0, 0, .55);
            color: white;
            font-family: monospace;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        .msg { margin: 4px 0; }
        .msg-row { display: flex; align-items: flex-start; gap: 8px; }
        .msg-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            flex: 0 0 auto;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .msg-content { flex: 1; min-width: 0; word-wrap: break-word; }
        .user { font-weight: bold; }
        .chat-image {
            max-width: 280px;
            max-height: 180px;
            display: block;
            margin-top: 4px;
            border-radius: 6px;
        }
        #chat {
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="chat"></div>
<script>
    let renderedIds = new Set();
    const MAX_MESSAGES = 100;
    const chatEl = document.getElementById("chat");

    function colorFromUsername(name) {
        let hash = 0;
        const text = String(name || "").toLowerCase();
        for (let i = 0; i < text.length; i++) {
            hash = ((hash << 5) - hash) + text.charCodeAt(i);
            hash |= 0;
        }
        const hue = Math.abs(hash) % 360;
        return `hsl(${hue}, 75%, 65%)`;
    }
    function renderMessageText(text) {
        const raw = String(text ?? "");
        const urlRegex = /(https?:\/\/[^\s]+)/gi;
        let html = "";
        let lastIndex = 0;
        let match;
        const sanitize = (str) => {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        };

        while ((match = urlRegex.exec(raw)) !== null) {
            const url = match[0];
            html += sanitize(raw.slice(lastIndex, match.index));
            const safeUrl = encodeURI(url);
            html += `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${sanitize(url)}</a>`;
            html += `<img class="chat-image" src="${safeUrl}" alt="chat image" loading="lazy" onerror="this.remove()">`;
            lastIndex = match.index + url.length;
        }
        html += sanitize(raw.slice(lastIndex));
        return html;
    }

    async function update() {
        try {
            const r = await fetch("/chatjson");
            const d = await r.json();
            const nearBottom = (chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight) < 100;

            d.messages.forEach(m => {
                if (!renderedIds.has(m.id)) {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "msg";
                    msgDiv.dataset.id = m.id;

                    const row = document.createElement("div");
                    row.className = "msg-row";

                    if (d.show_pfp) {
                        const img = document.createElement("img");
                        img.className = "msg-avatar";
                        img.src = m.pfp_url;
                        img.onerror = () => img.remove();
                        row.appendChild(img);
                    }

                    const content = document.createElement("div");
                    content.className = "msg-content";

                    let userColor = colorFromUsername(m.user);
                    if (m.is_owner) userColor = "#ffdf3a";
                    else if (m.is_moderator) userColor = "#50a5ff";

                    const userSpan = document.createElement("span");
                    userSpan.className = "user";
                    userSpan.style.color = userColor;
                    userSpan.textContent = m.user;
                    
                    content.appendChild(userSpan);
                    content.append(": ");

                    const textSpan = document.createElement("span");
                    textSpan.innerHTML = renderMessageText(m.text);
                    content.appendChild(textSpan);

                    row.appendChild(content);
                    msgDiv.appendChild(row);
                    chatEl.appendChild(msgDiv);
                    
                    renderedIds.add(m.id);
                }
            });
            while (chatEl.children.length > MAX_MESSAGES) {
                const oldest = chatEl.firstChild;
                renderedIds.delete(oldest.dataset.id);
                chatEl.removeChild(oldest);
            }

            if (nearBottom) {
                chatEl.scrollTop = chatEl.scrollHeight;
            }
        } catch (e) {
            console.error("Chat update failed:", e);
        }
    }

    async function poll() {
        await update();
        setTimeout(poll, 1000);
    }
    poll();
</script>
</body>
</html>
