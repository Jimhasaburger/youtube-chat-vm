<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <style>
        body {
            background: rgba(0, 0, 0, .55);
            color: white;
            font-family: monospace;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        .msg { margin: 4px 0; }
        .msg-row { display: flex; align-items: flex-start; gap: 8px; }
        .msg-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            flex: 0 0 auto;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .msg-content { flex: 1; min-width: 0; word-wrap: break-word; }
        .user { font-weight: bold; }
        .chat-image {
            max-width: 280px;
            max-height: 180px;
            display: block;
            margin-top: 4px;
            border-radius: 6px;
        }
        #chat {
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="chat"></div>

<script>
let renderedIds = new Set();

function colorFromUsername(name) {
    let hash = 0;
    const text = String(name || "").toLowerCase();
    for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 75%, 65%)`;
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.innerText = String(value ?? "");
    return div.innerHTML;
}

function renderMessageText(text) {
    const raw = String(text ?? "");
    const urlRegex = /(https?:\/\/[^\s]+)/gi;
    let html = "";
    let lastIndex = 0;
    let match;
    while ((match = urlRegex.exec(raw)) !== null) {
        const url = match[0];
        const idx = match.index;
        html += escapeHtml(raw.slice(lastIndex, idx));
        const safeUrl = escapeHtml(url);
        html += `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>`;
        html += `<img class="chat-image" src="${safeUrl}" alt="chat image" loading="lazy" onerror="this.remove()">`;
        lastIndex = idx + url.length;
    }
    html += escapeHtml(raw.slice(lastIndex));
    return html;
}

async function update() {
    try {
        let r = await fetch("/chatjson");
        let d = await r.json();
        const chatEl = document.getElementById("chat");
        const nearBottom = (chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight) < 100;

        d.messages.forEach(m => {
            if (!renderedIds.has(m.id)) {
                const msgDiv = document.createElement("div");
                msgDiv.className = "msg";
                let userColor = colorFromUsername(m.user);
                if (m.is_owner) userColor = "#ffdf3a";
                else if (m.is_moderator) userColor = "#50a5ff";

                const avatarHtml = d.show_pfp ? `<img class="msg-avatar" src="${m.pfp_url}" onerror="this.remove()">` : "";

                msgDiv.innerHTML = `
                    <div class="msg-row">
                        ${avatarHtml}
                        <div class="msg-content">
                            <span class="user" style="color:${userColor}">${escapeHtml(m.user)}</span>: 
                            ${renderMessageText(m.text)}
                        </div>
                    </div>`;
                
                chatEl.appendChild(msgDiv);
                renderedIds.add(m.id);
            }
        });

        if (nearBottom) {
            chatEl.scrollTop = chatEl.scrollHeight;
        }
    } catch (e) {
        console.error(e);
    }
}
setInterval(update, 1000);
</script>
</body>
</html>
